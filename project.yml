name: QuietToday
options:
  bundleIdPrefix: com.evina
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  QuietToday:
    type: application
    platform: iOS
    sources:
      - QuietToday
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evina.quiettoday
        INFOPLIST_FILE: QuietToday/Support/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
